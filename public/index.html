<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engosoft AI Copilot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1b1b2f;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #6c5ce7, #a855f7);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .header-icon {
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .header-info h1 {
            font-size: 14px;
            font-weight: 600;
            color: white;
        }

        .header-info p {
            font-size: 11px;
            color: rgba(255,255,255,0.7);
        }

        .context-badge {
            margin-right: auto;
            margin-left: 0;
            background: rgba(255,255,255,0.15);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 10px;
            color: rgba(255,255,255,0.8);
            display: none;
        }

        /* Messages Area */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .messages::-webkit-scrollbar {
            width: 4px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 13px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: #6c5ce7;
            color: white;
            border-bottom-left: 4px;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: #2d2d44;
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        .message.assistant pre {
            background: #1a1a2e;
            padding: 8px 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
            font-size: 12px;
            direction: ltr;
            text-align: left;
        }

        .message.assistant code {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            direction: ltr;
        }

        .message.assistant p {
            margin-bottom: 6px;
        }

        .message.assistant ul, .message.assistant ol {
            padding-right: 20px;
            margin: 6px 0;
        }

        .message.assistant li {
            margin-bottom: 4px;
        }

        .message.assistant strong {
            color: #a855f7;
        }

        .message.system {
            align-self: center;
            background: transparent;
            color: #888;
            font-size: 12px;
            text-align: center;
        }

        /* Typing indicator */
        .typing {
            display: none;
            align-self: flex-start;
            padding: 10px 14px;
            background: #2d2d44;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
        }

        .typing.active {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .typing span {
            width: 6px;
            height: 6px;
            background: #888;
            border-radius: 50%;
            animation: blink 1.4s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }

        /* Quick Actions */
        .quick-actions {
            padding: 8px 16px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .quick-btn {
            background: #2d2d44;
            border: 1px solid #444;
            color: #ccc;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .quick-btn:hover {
            background: #6c5ce7;
            color: white;
            border-color: #6c5ce7;
        }

        /* Input Area */
        .input-area {
            padding: 12px 16px;
            background: #222240;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
            border-top: 1px solid #333;
        }

        .input-area input {
            flex: 1;
            background: #1b1b2f;
            border: 1px solid #444;
            color: white;
            padding: 10px 14px;
            border-radius: 24px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area input:focus {
            border-color: #6c5ce7;
        }

        .input-area input::placeholder {
            color: #666;
        }

        .send-btn {
            width: 40px;
            height: 40px;
            background: #6c5ce7;
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: #5a4bd1;
        }

        .send-btn:disabled {
            background: #444;
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 18px;
            height: 18px;
            transform: rotate(180deg);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-icon">🤖</div>
        <div class="header-info">
            <h1>Engosoft AI Copilot</h1>
            <p>مساعدك الذكي — Chatwoot + الكورسات</p>
        </div>
        <div class="context-badge" id="contextBadge"></div>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages">
        <div class="message system">
            👋 أهلاً! أنا Engosoft Copilot — اسألني عن Chatwoot أو الكورسات
        </div>
    </div>

    <!-- Typing Indicator -->
    <div class="typing" id="typing">
        <span></span><span></span><span></span>
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions">
        <button class="quick-btn" onclick="askQuick('إزاي أوقف البوت وأمسك المحادثة؟')">🤖 إيقاف البوت</button>
        <button class="quick-btn" onclick="askQuick('إيه الكورسات المتاحة في الكهرباء؟')">⚡ كورسات كهرباء</button>
        <button class="quick-btn" onclick="askQuick('إيه باقة الميكانيكا الشاملة؟')">🔧 ميكانيكا شاملة</button>
        <button class="quick-btn" onclick="askQuick('إيه حالات المحادثات وتأثيرها؟')">💬 حالات المحادثات</button>
        <button class="quick-btn" onclick="askQuick('إيه الكورسات المتاحة في BIM؟')">🏗️ كورسات BIM</button>
    </div>

    <!-- Input -->
    <div class="input-area">
        <input 
            type="text" 
            id="input" 
            placeholder="اكتب سؤالك هنا..."
            autocomplete="off"
        />
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
            </svg>
        </button>
    </div>

    <script>
        // ============================================
        // Base URL - auto-detect from current page
        // ============================================
        const BASE_URL = window.location.origin;

        // ============================================
        // Session & Context
        // ============================================
        const sessionId = 'session-' + Date.now();
        let conversationContext = null;

        // ============================================
        // Listen for Chatwoot Dashboard App Events
        // ============================================
        window.addEventListener('message', (event) => {
            try {
                if (event.data && typeof event.data === 'object') {
                    const data = event.data;
                    
                    if (data.event === 'appContext' || data.id || data.meta) {
                        conversationContext = {
                            id: data.id,
                            status: data.status,
                            inbox: data.inbox_id,
                            contactName: data.meta?.sender?.name || '',
                            contactEmail: data.meta?.sender?.email || '',
                            assignee: data.meta?.assignee?.name || ''
                        };

                        const badge = document.getElementById('contextBadge');
                        badge.textContent = `محادثة #${data.id || '—'}`;
                        badge.style.display = 'block';
                    }
                }
            } catch (e) {}
        });

        // Request context from Chatwoot
        try {
            window.parent.postMessage('chatwoot-dashboard-app:fetch-info', '*');
        } catch (e) {}

        // ============================================
        // Chat Functions
        // ============================================
        const messagesEl = document.getElementById('messages');
        const inputEl = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const typingEl = document.getElementById('typing');

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            
            if (type === 'assistant') {
                div.innerHTML = formatMarkdown(text);
            } else {
                div.textContent = text;
            }
            
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function formatMarkdown(text) {
            return text
                .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code style="background:#1a1a2e;padding:2px 6px;border-radius:4px;direction:ltr">$1</code>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/^### (.+)$/gm, '<strong style="font-size:14px">$1</strong><br>')
                .replace(/^## (.+)$/gm, '<strong style="font-size:15px;color:#a855f7">$1</strong><br>')
                .replace(/^- (.+)$/gm, '• $1<br>')
                .replace(/^\d+\. (.+)$/gm, (m, p1, offset, str) => `${str.substring(0, offset).split('\n').filter(l => /^\d+\./.test(l)).length + 1}. ${p1}<br>`)
                .replace(/\n\n/g, '<br><br>')
                .replace(/\n/g, '<br>');
        }

        async function sendMessage() {
            const text = inputEl.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            inputEl.value = '';
            sendBtn.disabled = true;

            typingEl.classList.add('active');
            messagesEl.scrollTop = messagesEl.scrollHeight;

            try {
                const response = await fetch(BASE_URL + '/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: text,
                        sessionId,
                        conversationContext
                    })
                });

                const data = await response.json();

                if (data.error) {
                    addMessage('⚠️ حصل خطأ: ' + data.error, 'system');
                } else {
                    addMessage(data.reply, 'assistant');
                }
            } catch (error) {
                addMessage('⚠️ مفيش اتصال بالسيرفر', 'system');
            }

            typingEl.classList.remove('active');
            sendBtn.disabled = false;
            inputEl.focus();
        }

        function askQuick(question) {
            inputEl.value = question;
            sendMessage();
        }

        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        inputEl.focus();
    </script>
</body>
</html>
